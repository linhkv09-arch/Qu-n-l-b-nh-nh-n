<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý bệnh nhân Tai Mũi Họng</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">TMH</div>
        <div class="brand-text">
          <div class="brand-title">Quản lý bệnh nhân</div>
          <div class="brand-sub">Chuyên khoa Tai Mũi Họng</div>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item" data-view="dashboard">
          <span class="nav-ico">🏠</span> Trang chủ
        </button>
        <button class="nav-item" data-view="patients">
          <span class="nav-ico">👥</span> Bệnh nhân
        </button>
        <button class="nav-item" data-view="visits">
          <span class="nav-ico">🩺</span> Khám bệnh
        </button>
        <button class="nav-item" data-view="surgeries">
          <span class="nav-ico">🔪</span> Phẫu thuật
        </button>
        <button class="nav-item" data-view="reports">
          <span class="nav-ico">📊</span> Báo cáo
        </button>
        <button class="nav-item" data-view="settings">
          <span class="nav-ico">⚙️</span> Cài đặt
        </button>
        <button class="nav-item" data-view="backup">
          <span class="nav-ico">💾</span> Sao lưu
        </button>
      </nav>
      <div class="sidebar-footer">
        <div id="storageInfo" class="storage-info"></div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <h1 id="viewTitle">Trang chủ</h1>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <div id="viewRoot" class="view-root"></div>
    </main>
  </div>

  <!-- Modal container -->
  <div id="modalRoot"></div>
  <!-- Toast container -->
  <div id="toastRoot" class="toast-root"></div>

  <!-- Scripts (classic scripts so it runs by double-clicking the file, no server needed) -->
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/patients.js"></script>
  <script src="js/visits.js"></script>
  <script src="js/surgeries.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/prescription.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
